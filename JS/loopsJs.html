<body>
    <script>
        //javascript provides several types of loops to execute a block of code repeatedly until a specified condition is met.
        //types of loops
        let studentList=["Prerna", "Shubhash", "Satyarth", "Shivam", "Anshul"
            23, 23, 34, 45, 67
        ];

        //for loop
        for(let i=0; i<studentList.length; i++){
            console.log(studentList[0][1]);
            console.log(studentList[3]);
        }
        //while
        let ii=0;
        while(i<studentList.length){
            console.log(studentList[5]);
            i++;
        }
        //for.of
        for(let x of studentList){
            console.log(x);
        }

    </script>

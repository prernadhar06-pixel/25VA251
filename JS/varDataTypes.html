<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Value Types in JS</title>
</head>
<body>
    <script>
        //JS Data Value Types
        //Primitive - immutable single value data type in JS
        //string, number, boolean, undefined, null, BigInt and symbol

        //string
        var myName="prerna dhar";
        console.log(myName);
        //number
        var myMob="9717686701"
        console.log(myName + " mobile number is" + myMob);
        //boolean
        var isMarried="false";
        console.log(myName + "is married" + isMarried);
        //undefined
        var myEmail;
        console.log(myEmail);
        console.log(typeof myEmail);
        //null
        var myAddress=null;
        console.log(myAddress); 
        console.log(typeof myAddress);
        var myNum=BigInt(8749749787896867865779);
        console.log(myNum);
        console.log(typeof(myNum));
        //symbol
        var var1=Symbol("Prerna");
        var var2=Symbol("Prerna");
        console.log(var1==var2);

        //reference type(Object)--mutable in memory and keep the data in key value pair

        //object{}, function(), array[]
        let myInfo={
            name:"Megha",
            age:23, 
            isMarried:false, 
            address:"Delhi-59",
            branch:"cse",
            section:"23"
        };
        console.log(myInfo);
        console.log(myInfo.name + " and her age is " + myInfo.age);

        //object length
        var keys=Object.keys(myInfo);
        console.log(keys.length);

        ///function- reusable block of code that performs a particular task

        function cal(){
            var num1=45;
            var num2=40;
            var add=num1+num2;
            console.log("addition of two numbers is "+ add);
        }
        cal();

        //array- collection of data items of any data type
        let studentList=["stu1", "stu2", "stu3", "stu4", "stu5"];
        console.log(studentList[0]);
        //for different data types in array
        let stu1=["Vikas", 23, false, "GZB", "CSE", null, 18]
        console.log(stu1);
        console.log(stu1.length);

        //to iterate array member
        for(let i=0; i<studentList.length; i++){
            console.log(studentList[i]);
        }

        for(let x in stu1){
            console.log("updated way" + stu1[x]);
        }


    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
</head>
<body>
    <script>
        //object- collection(pair of keys/properties and values)
        //create an object- using literal way, and new keyword
        let student={
            name: "Prerna", 
            age: 18, 
            isMarried:false, 
            address:{
                houseNo: A-33,
                area: Hastsal_Vihar,
                city: Delhi,
                pinCode:110059,
            },
            education:["10th", "12th"],
            degree:B.Tech,
            branch: CSE,
            year:2025,
            getInfo:function(){
            return "my current pincode is"+ student.address.pinCode;
        }
        };
        //access onbject's keys using dot notation
        console.log(student.address.pinCode); //object
        console.log(student.education[1]);
        console.log(student.getInfo()); //function
        console.log(typeof (student));

        //find keys in object
        console.log('name' in student);
        //delete keys from object
        console.log(delete student.name);
        console.log(student);
        //find length of objects
        let keysLength=Object.keys(student);
        console.log(keysLength.length);
        //iterate keys of object
        for(let i=0;i<keysLength.length;i++){
            console.log(keysLength[i]);
        }
        for  (let x in student){
            console.log(student[x]);
        }

        //create object using new keyword
        let myInfo=new Object();
        myInfo.name="Prerna";
        myInfo.age=18;
        myInfo.mobile=9717686701;
        console.log(myInfo.name); //using dot notation
        console.log(myInfo['address']); //using bracket notation

            console.log(student);
            console.log(typeof student);
        
        
    </script>
    
</body>
</html>
